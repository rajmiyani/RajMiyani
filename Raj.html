<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scroll Animation</title>

    <!-- Font Awesome (For Icons, If Needed) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css"
        integrity="sha512-Evv84Mr4kqVGRNSgIGL/F/aIDqQb7xQ2vcrdIwxfjThSH8CSR7PBEakCr51Ck+w+/U6swU2Im1vVX0SVk9ABhg=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />

    <style>
        /* General Styles */
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: black;
            color: white;
        }

        /* Sections */
        .section {
            opacity: 0;
            transform: translateY(50px);
            transition: opacity 0.6s ease-out, transform 0.6s ease-out;
            padding: 100px 20px;
            text-align: center;
            border-bottom: 1px solid #333;
        }

        /* When visible, fade-in animation */
        .section.show {
            opacity: 1;
            transform: translateY(0);
        }
    </style>
</head>

<body>

    <section class="section">
        <h2>Welcome to My Portfolio</h2>
        <p>This section will appear when scrolled.</p>
    </section>

    <section class="section">
        <h2>About Me</h2>
        <p>This content appears as you scroll.</p>
    </section>

    <section class="section">
        <h2>My Projects</h2>
        <p>More sections revealed when scrolling.</p>
    </section>

    <section class="section">
        <h2>Contact Me</h2>
        <p>Let's connect and build something amazing!</p>
    </section>

    

</body>

</html>

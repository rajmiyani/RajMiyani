<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bootstrap Slider with Round Indicators</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        /* Custom styling for round indicators */
        .carousel-indicators button {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background-color: #bbb;
            border: none;
            margin: 0 5px;
            transition: background-color 0.3s ease;
        }

        /* Active indicator color */
        .carousel-indicators .active {
            background-color: #00D47B; /* Change color as needed */
        }
    </style>
</head>
<body>

<div id="simpleCarousel" class="carousel slide" data-bs-ride="carousel">
    <!-- Round Indicators -->
    <div class="carousel-indicators">
        <button type="button" data-bs-target="#simpleCarousel" data-bs-slide-to="0" class="active"></button>
        <button type="button" data-bs-target="#simpleCarousel" data-bs-slide-to="1"></button>
        <button type="button" data-bs-target="#simpleCarousel" data-bs-slide-to="2"></button>
    </div>

    <div class="carousel-inner">
        <div class="carousel-item active">
            <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQtnh7pgJUtpZWWtHn-eVA3n1DY6D6WpnGOdA&s" class="d-block w-100" alt="Slide 1">
        </div>
        <div class="carousel-item">
            <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQtnh7pgJUtpZWWtHn-eVA3n1DY6D6WpnGOdA&s" class="d-block w-100" alt="Slide 2">
        </div>
        <div class="carousel-item">
            <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQtnh7pgJUtpZWWtHn-eVA3n1DY6D6WpnGOdA&s" class="d-block w-100" alt="Slide 3">
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
